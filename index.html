                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="p-4 rounded-2xl ${theme.lightBg} border ${theme.border} flex flex-col justify-center items-center">
                                    <span class="text-xs text-gray-500 mb-1">总热量 (大卡)</span>
                                    <span class="text-2xl font-black ${theme.text}">${cal}</span>
                                </div>
                                <div class="p-4 rounded-2xl bg-red-50 border border-red-100 flex flex-col justify-center items-center">
                                    <span class="text-xs text-gray-500 mb-1">蛋白质 (g)</span>
                                    <span class="text-2xl font-black text-red-600">${p}</span>
                                </div>
                                <div class="p-4 rounded-2xl bg-blue-50 border border-blue-100 flex flex-col justify-center items-center">
                                    <span class="text-xs text-gray-500 mb-1">碳水化合物 (g)</span>
                                    <span class="text-2xl font-black text-blue-600">${c}</span>
                                </div>
                                <div class="p-4 rounded-2xl bg-amber-50 border border-amber-100 flex flex-col justify-center items-center">
                                    <span class="text-xs text-gray-500 mb-1">脂肪 (g)</span>
                                    <span class="text-2xl font-black text-amber-600">${f}</span>
                                </div>
                            </div>
                        </div>

                        <!-- 具体餐单 -->
                        <div class="space-y-4">
                            ${mealsHtml}
                        </div>
                    </div>
                `;
            } else {
                // 采购清单视图
                let listHtml = shoppingList.map(cat => `
                    <div class="bg-gray-50 rounded-2xl p-5 border border-gray-100">
                        <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2 mb-4">
                            <div class="p-2 rounded-lg ${cat.color} flex items-center justify-center">
                                <i class="ph ${cat.icon} text-xl"></i>
                            </div>
                            ${cat.category}
                        </h3>
                        <ul class="space-y-3">
                            ${cat.items.map(item => `
                                <li class="flex items-start gap-3">
                                    <input type="checkbox" class="mt-1 w-4 h-4 text-indigo-600 rounded border-gray-300 cursor-pointer">
                                    <span class="text-gray-700 leading-tight">${item}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `).join('');

                contentDiv.innerHTML = `
                    <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-gray-100 animation-fade-in">
                        <div class="mb-6">
                            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                <i class="ph-fill ph-shopping-cart text-indigo-500"></i>
                                全周生鲜采购清单
                            </h2>
                            <p class="text-gray-500 mt-2">基于一周双人食谱汇总，建议每周末统一采购干货，生鲜蔬菜每隔3天采购一次以保证新鲜。</p>
                        </div>
                        <div class="grid md:grid-cols-2 gap-6">
                            ${listHtml}
                        </div>
                    </div>
                `;
            }
        }

        // --- 交互事件 ---
        function setTab(tab) {
            activeTab = tab;
            render();
        }

        function setPerson(person) {
            activePerson = person;
            render();
        }

        function setDay(idx) {
            activeDayIdx = idx;
            render();
        }

        // 初始化渲染
        render();
    </script>
<script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('PWA 离线支持已启动'))
                    .catch(err => console.log('PWA 启动失败: ', err));
            });
        }
    </script>
</body>
</html>
